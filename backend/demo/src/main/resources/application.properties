# ==========================================
# Application
# ==========================================
spring.application.name=demo

# ==========================================
# Database Configuration
# ==========================================
#spring.datasource.url=jdbc:mysql://localhost:3306/app_db1?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.url=jdbc:mysql://localhost:3306/app_db1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=joel@Alex$2608
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ==========================================
# Server
# ==========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

# ==========================================
# JWT
# ==========================================
jwt.secret=YourSecretKeyMustBeAtLeast32CharactersLong12345

# ==========================================
# Aptitude Question Source
# ==========================================
aptitude.question-source.base-url=https://aptitude-gold.vercel.app
aptitude.question-source.request-timeout-ms=4000
aptitude.question-source.max-attempts-per-topic=12

# Topics
aptitude.question-source.topics[0]=Random
aptitude.question-source.topics[1]=Age
aptitude.question-source.topics[2]=ProfitAndLoss
aptitude.question-source.topics[3]=PipesAndCistern
aptitude.question-source.topics[4]=SpeedTimeDistance
aptitude.question-source.topics[5]=SimpleInterest
aptitude.question-source.topics[6]=Calendar
aptitude.question-source.topics[7]=PermutationAndCombination
aptitude.question-source.topics[8]=MixtureAndAlligation

# ==========================================
# Default Test Settings
# ==========================================
aptitude.test.default-question-count=30
aptitude.test.default-duration-minutes=45
# ==========================================
# Coding Test Execution (Piston public API)
# ==========================================
#coding.execution.base-url=https://emkc.org/api/v2/piston
# NOTE (as of Feb 15, 2026): the public Piston API above now requires an API key
# (see https://github.com/engineer-man/piston) and returns 401 without one.
# For local dev, self-host Piston instead and point this at it, e.g.:

coding.execution.base-url=http://localhost:2000/api/v2
coding.execution.compile-timeout-ms=10000
coding.execution.run-timeout-ms=3000
# See CODING_MODULE_README.md for self-host instructions.
coding.execution.timeout-ms=15000

# ==========================================
# Coding Test Default Settings
# ==========================================
coding.test.default-duration-minutes=60
